# Setup
title: Rodion Proskuryakov
description: MLOps Engineer
url: https://rproskuryakov.github.io
avatar: /avatar.jpg
paginate: 5
permalink: pretty
cover_image: /background.jpg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec
  - vendor/

# Optimize Jekyl SEO Tag
#twitter:
#  username: vszhub
#  card: summary
#logo: logo.png
social:
  name: Rodion Proskuryakov
  links:
    - https://github.com/rproskuryakov
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Rodion Proskuryakov
  url: https://github.com/rproskuryakov/
  email: rproskuryakov.job@gmail.com